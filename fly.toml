# Fly.io configuration — fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "my-python-app"  # Change this to your app name
primary_region = "iad"  # US East — change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_NAME = "my-python-app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
